<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homelab Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.1);
            --gap: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            padding-top: 70px; /* Space for fixed header */
        }

        /* Fixed Navigation / Tabs at top */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .tabs-container {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 16px;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab-btn.active {
            color: var(--accent);
            background-color: var(--accent-dim);
        }

        /* Dashboard Content Matrix */
        .tab-content {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.2s ease-in-out;
            padding-bottom: 40px;
        }

        .tab-content.active {
            display: block;
        }

        .group-title {
            font-size: 1.1rem;
            color: var(--accent);
            margin: 24px 0 12px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #334155;
        }

        .group-title:first-child {
            margin-top: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--gap);
        }

        /* Touch-friendly Dashboard Cards */
        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            text-align: center;
            min-height: 110px;
            transition: transform 0.1s ease, border-color 0.2s ease;
        }

        .card:active {
            transform: scale(0.97);
            border-color: var(--accent);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-word;
        }

        .error-msg {
            text-align: center;
            color: #f87171;
            margin-top: 40px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <nav class="tabs-container" id="tabs-bar"></nav>
    </header>

    <main id="dashboard-content"></main>

    <script>
        // Helper function to auto-assign emojis based on the link label
        function getIconForLabel(label) {
            const lower = label.toLowerCase();
            if (lower.includes('frigate') || lower.includes('camera')) return '📹';
            if (lower.includes('home assistant')) return '🏠';
            if (lower.includes('proxmox')) return '🖥️';
            if (lower.includes('zigbee')) return '🐝';
            if (lower.includes('immich') || lower.includes('photo')) return '🖼️';
            if (lower.includes('paperless')) return '📄';
            if (lower.includes('pi-hole')) return '🛡️';
            if (lower.includes('uptime')) return '⏱️';
            if (lower.includes('dockge') || lower.includes('portainer')) return '🐳';
            if (lower.includes('erpnext')) return '💼';
            if (lower.includes('file')) return '📁';
            return '🔗'; // Fallback
        }

        async function initDashboard() {
            const tabsBar = document.getElementById('tabs-bar');
            const contentContainer = document.getElementById('dashboard-content');

            try {
                // Fetch the configuration file
                const response = await fetch('links.json');
                if (!response.ok) throw new Error('Failed to load links.json. Make sure the file exists in the same directory.');
                const data = await response.json();

                // Determine which tab to open first (Check localStorage, fallback to first item)
                const savedTab = localStorage.getItem('activeTab');
                const initialTabId = data.tabs.some(tab => tab.id === savedTab) 
                    ? savedTab 
                    : data.tabs[0]?.id;

                // Render structure dynamically based on your specific JSON format
                data.tabs.forEach((tab) => {
                    // 1. Create Tab Button
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${tab.id === initialTabId ? 'active' : ''}`;
                    btn.textContent = tab.label;
                    btn.onclick = () => switchTab(tab.id);
                    btn.setAttribute('data-tab-id', tab.id);
                    tabsBar.appendChild(btn);

                    // 2. Create Tab Content Pane Container
                    const contentPane = document.createElement('div');
                    contentPane.id = `pane-${tab.id}`;
                    contentPane.className = `tab-content ${tab.id === initialTabId ? 'active' : ''}`;

                    // 3. Populate Groups and Links
                    if (tab.groups) {
                        tab.groups.forEach(group => {
                            // Create Group Title (e.g., "Cambodia House")
                            const groupTitle = document.createElement('h3');
                            groupTitle.className = 'group-title';
                            groupTitle.textContent = group.name;
                            contentPane.appendChild(groupTitle);

                            // Create Grid for this group
                            const grid = document.createElement('div');
                            grid.className = 'grid';

                            // Populate Link Cards
                            group.links.forEach(link => {
                                const card = document.createElement('a');
                                card.href = link.url;
                                card.className = 'card';
                                card.target = '_self'; 

                                const icon = getIconForLabel(link.label);

                                card.innerHTML = `
                                    <span class="card-icon">${icon}</span>
                                    <span class="card-name">${link.label}</span>
                                `;
                                grid.appendChild(card);
                            });

                            contentPane.appendChild(grid);
                        });
                    }

                    contentContainer.appendChild(contentPane);
                });

            } catch (err) {
                contentContainer.innerHTML = `<div class="error-msg"><h3>Error</h3><p>${err.message}</p></div>`;
            }
        }

        function switchTab(tabId) {
            // Update active states on Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab-id') === tabId);
            });

            // Update active states on Content Panes
            document.querySelectorAll('.tab-content').forEach(pane => {
                pane.classList.toggle('active', pane.id === `pane-${tabId}`);
            });

            // Save state to persistence engine
            localStorage.setItem('activeTab', tabId);
        }

        // Bootstrapping
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
