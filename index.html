<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homelab Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.12);
            --gap: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            padding-top: 70px;
            overflow-x: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        .tabs-container {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            padding: 10px 16px;
            gap: 8px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .tab-btn.active {
            color: var(--accent);
            background-color: var(--accent-dim);
        }

        .tab-content {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.18s ease-out;
            padding-bottom: 40px;
        }

        .tab-content.active {
            display: block;
        }

        .group-title {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin: 18px 4px 8px 4px;
        }

        .group-title:first-child {
            margin-top: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            padding: 12px 10px;
            min-height: 48px;
            transition: transform 0.1s ease, border-color 0.15s ease, background-color 0.15s ease;
        }

        .card:active {
            transform: scale(0.97);
            border-color: var(--accent);
            background-color: #243348;
        }

        .card-icon {
            font-size: 1.4rem;
            margin-right: 10px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .card-name {
            font-size: 0.88rem;
            font-weight: 500;
            word-break: break-word;
            line-height: 1.25;
        }

        .card-id {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-text {
            display: flex;
            flex-direction: column;
        }

        .error-msg {
            text-align: center;
            color: #f87171;
            margin-top: 60px;
            padding: 0 20px;
        }

        .error-msg h3 {
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <nav class="tabs-container" id="tabs-bar"></nav>
    </header>

    <main id="dashboard-content"></main>

    <script>
        function getIconForLabel(label) {
            const lower = label.toLowerCase();
            if (lower.includes('dockge')) return '🐳';
            if (lower.includes('portainer')) return '🐳';
            if (lower.includes('frigate') || lower.includes('camera')) return '📹';
            if (lower.includes('home assistant')) return '🏠';
            if (lower.includes('proxmox')) return '🖥️';
            if (lower.includes('zigbee')) return '🐝';
            if (lower.includes('immich') || lower.includes('photo')) return '🖼️';
            if (lower.includes('paperless')) return '📄';
            if (lower.includes('pi-hole')) return '🛡️';
            if (lower.includes('uptime')) return '⏱️';
            if (lower.includes('pulse')) return '📊';
            if (lower.includes('erpnext') || lower.includes('pos')) return '💼';
            if (lower.includes('file')) return '📁';
            if (lower.includes('duplicati') || lower.includes('backup')) return '💾';
            if (lower.includes('homepage')) return '🧭';
            if (lower.includes('tailscale')) return '🔒';
            return '🔗';
        }

        async function initDashboard() {
            const tabsBar = document.getElementById('tabs-bar');
            const contentContainer = document.getElementById('dashboard-content');

            try {
                const response = await fetch('links.json');
                if (!response.ok) throw new Error('Failed to load links.json. Make sure the file exists in the same directory.');
                const data = await response.json();

                const savedTab = localStorage.getItem('activeTab');
                const initialTabId = data.tabs.some(tab => tab.id === savedTab)
                    ? savedTab
                    : data.tabs[0]?.id;

                data.tabs.forEach((tab) => {
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${tab.id === initialTabId ? 'active' : ''}`;
                    btn.textContent = tab.label;
                    btn.onclick = () => switchTab(tab.id);
                    btn.setAttribute('data-tab-id', tab.id);
                    tabsBar.appendChild(btn);

                    const contentPane = document.createElement('div');
                    contentPane.id = `pane-${tab.id}`;
                    contentPane.className = `tab-content ${tab.id === initialTabId ? 'active' : ''}`;

                    if (tab.groups) {
                        tab.groups.forEach(group => {
                            const groupTitle = document.createElement('h3');
                            groupTitle.className = 'group-title';
                            groupTitle.textContent = group.name;
                            contentPane.appendChild(groupTitle);

                            const grid = document.createElement('div');
                            grid.className = 'grid';

                            group.links.forEach(link => {
                                const card = document.createElement('a');
                                card.href = link.url;
                                card.className = 'card';
                                card.target = '_blank';
                                card.rel = 'noopener';

                                const icon = getIconForLabel(link.label);
                                const idTag = link.id ? `<span class="card-id">${link.id === 'host' ? 'Host' : 'CT ' + link.id}</span>` : '';

                                card.innerHTML = `
                                    <span class="card-icon">${icon}</span>
                                    <span class="card-text">
                                        <span class="card-name">${link.label}</span>
                                        ${idTag}
                                    </span>
                                `;
                                grid.appendChild(card);
                            });

                            contentPane.appendChild(grid);
                        });
                    }

                    contentContainer.appendChild(contentPane);
                });

                initSwipeControls();

            } catch (err) {
                contentContainer.innerHTML = `<div class="error-msg"><h3>Couldn't load dashboard</h3><p>${err.message}</p></div>`;
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab-id') === tabId);
            });
            document.querySelectorAll('.tab-content').forEach(pane => {
                pane.classList.toggle('active', pane.id === `pane-${tabId}`);
            });
            localStorage.setItem('activeTab', tabId);
        }

        function initSwipeControls() {
            let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
            const threshold = 60;
            const restraint = 80;

            document.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipeGesture();
            }, { passive: true });

            function handleSwipeGesture() {
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                if (Math.abs(deltaX) >= threshold && Math.abs(deltaY) <= restraint) {
                    navigateTab(deltaX < 0 ? 1 : -1);
                }
            }

            function navigateTab(direction) {
                const tabs = Array.from(document.querySelectorAll('.tab-btn'));
                if (tabs.length === 0) return;
                const activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
                if (activeIndex === -1) return;
                const nextIndex = activeIndex + direction;
                if (nextIndex >= 0 && nextIndex < tabs.length) {
                    switchTab(tabs[nextIndex].getAttribute('data-tab-id'));
                }
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
